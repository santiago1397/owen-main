; ============================================================================
; http.conf — HTTP server that hosts ARI + the ARI WebSocket (TEMPLATE)
;
; ${VAR} tokens are substituted from .env.prod at deploy time (see README.md).
;
; Binding: Asterisk binds a single address. We bind the docker host-gateway interface
; (${ARI_BIND_ADDR}, e.g. the callmon-net gateway / 172.x.0.1) so the backend container
; can reach ARI at host.docker.internal:${ARI_PORT}, and lock it down further with UFW
; (allow 8088 only from the pinned callmon-net subnet — same pattern as Postgres
; pg_hba). It must NEVER be exposed publicly. For a loopback-only posture set
; ARI_BIND_ADDR=127.0.0.1 and reach it via an SSH/port mapping instead.
; ============================================================================

[general]
enabled = yes
bindaddr = ${ARI_BIND_ADDR}
bindport = ${ARI_PORT}
; TLS is terminated at the network boundary (loopback/host-gateway + UFW); plain HTTP is
; acceptable here because the socket is never routable off-host.
