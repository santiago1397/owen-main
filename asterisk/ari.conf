; ============================================================================
; ari.conf — Asterisk REST Interface (TEMPLATE)
;
; ${VAR} tokens are substituted from .env.prod at deploy time (see README.md). The ARI
; user/password are the ${ARI_USERNAME}/${ARI_PASSWORD} the backend uses; they are the
; only secret here and must NOT be hardcoded in git.
;
; ARI is reachable to the backend via the docker host-gateway. It is bound + firewalled
; in http.conf + UFW to loopback and the callmon-net subnet only — never public.
; ============================================================================

[general]
enabled = yes
pretty = yes
; Restrict the WebSocket/CORS origins to the local backend; ARI is not a public API.
allowed_origins = http://${ARI_HOST}:${ARI_PORT}
; Channel variables surfaced on every ARI channel event (channel.channelvars.<name>):
;   Linkedid          — how all legs of a call collapse onto ONE `calls` row (ticket 04/05).
;   X_OWEN_DIRECTION  — set to "outbound" on manual operator outbound legs (ticket 14) so the
;                       projection tags direction='outbound'; absent => inbound.
;   X_OWEN_FROM       — the owned BulkVS DID an outbound call presents; campaign attribution
;                       keys on it for outbound (the reverse of the inbound to-number match).
; CHANNEL(linkedid), not "Linkedid": there is no ${Linkedid} channel variable, so the old
; spelling exported an empty string on every event and legs never collapsed onto one call.
channelvars = CHANNEL(linkedid),X_OWEN_DIRECTION,X_OWEN_FROM

[${ARI_USERNAME}]
type = user
read_only = no
password = ${ARI_PASSWORD}
