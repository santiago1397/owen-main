; ============================================================================
; pjsip.conf — BulkVS SIP trunk (TEMPLATE)
;
; This is a RENDERED template: ${VAR} tokens are substituted from .env.prod at deploy
; time (see asterisk/README.md — `envsubst`). Do NOT hardcode secrets here; the only
; secret is ${BULKVS_SIP_PASSWORD}, which stays in .env.prod (chmod 600), never in git.
;
; BulkVS trunking model:
;   - INBOUND auth is by SBC source IP (the four `identify` match lines below), so no
;     credentials are needed to accept BulkVS's calls.
;   - OUTBOUND uses digest auth + (optionally) a REGISTER with the credentials below.
;   - Media (RTP) arrives from a DIFFERENT range than signalling (152.188.166.x), so RTP
;     is validated per-session by Asterisk rather than pinned by firewall — see rtp.conf
;     and the UFW notes in README.md.
; Asterisk 22.10.1 (pinned — `apt-mark hold`).
; ============================================================================

[transport-udp]
type = transport
protocol = udp
bind = 0.0.0.0:5060

; --- Trunk endpoint --------------------------------------------------------------------
[${BULKVS_TRUNK_NAME}]
type = endpoint
context = from-bulkvs
disallow = all
allow = ulaw
allow = alaw
outbound_auth = ${BULKVS_TRUNK_NAME}-auth
aors = ${BULKVS_TRUNK_NAME}
from_user = ${BULKVS_SIP_USERNAME}
direct_media = no
rtp_symmetric = yes
force_rport = yes
rewrite_contact = yes
; Answer only calls whose media we can validate (see rtp.conf).

[${BULKVS_TRUNK_NAME}-auth]
type = auth
auth_type = userpass
username = ${BULKVS_SIP_USERNAME}
password = ${BULKVS_SIP_PASSWORD}

[${BULKVS_TRUNK_NAME}]
type = aor
contact = sip:${BULKVS_SIP_USERNAME}@162.249.171.198
qualify_frequency = 60

; --- Inbound identification: trust only the four BulkVS SBC IPs ------------------------
[${BULKVS_TRUNK_NAME}]
type = identify
endpoint = ${BULKVS_TRUNK_NAME}
match = 162.249.171.198
match = 76.8.29.198
match = 69.12.88.198
match = 199.255.157.198

; --- Outbound registration (optional; comment out for pure IP-auth trunks) -------------
[${BULKVS_TRUNK_NAME}]
type = registration
transport = transport-udp
outbound_auth = ${BULKVS_TRUNK_NAME}-auth
server_uri = sip:162.249.171.198
client_uri = sip:${BULKVS_SIP_USERNAME}@162.249.171.198
retry_interval = 60

; ============================================================================
; Operator WebRTC softphone endpoints (Ticket 13 — in-platform calling)
;
; Each operator answers platform calls in the browser via a per-operator chan_pjsip WebRTC
; endpoint (SIP.js, wss + DTLS-SRTP), one channel under the call's Linkedid. This is a
; SEPARATE seam from the AI external-media path. ALL bridge/hold/blind-transfer is driven
; by the BACKEND over ARI — never browser->ARI.
;
; Transport: signalling is a WebSocket bound to the loopback/host-gateway (like ARI) and
; FRONTED BY TRAEFIK for public wss (no new cert lifecycle here — see README.md). Media is
; DTLS-SRTP straight to the EXISTING 10000-10200/udp RTP range (rtp.conf), with ICE
; advertising the VPS public IP; coturn (TLS/443) relays through restrictive firewalls with
; backend-minted ephemeral creds (turnserver.conf).
;
; Auth: the endpoints are STATIC (one per operator, named `operator-<slug>` — the slug the
; backend derives from the operator's email, see app/telephony/credentials.py). The digest
; PASSWORD is the per-deployment ${OPERATOR_SIP_SECRET} (rendered from .env.prod, never
; committed). The backend mints it (plus ephemeral TURN creds) ONLY to an authenticated
; operator at app-login; the real gate is app login, so a shared per-deployment SIP secret
; behind Traefik-fronted wss is acceptable (a per-session unique SIP password would need
; realtime PJSIP — out of scope). Add one endpoint/aor/auth trio per operator below.
; ============================================================================

[transport-wss]
type = transport
protocol = wss
; Bind the host-gateway (like ARI's http.conf) — Traefik terminates TLS and proxies public
; wss to this loopback/gateway socket. Never expose this bind publicly.
bind = ${ARI_BIND_ADDR}:8089
; Advertise the VPS public IP so ICE offers a routable candidate for DTLS-SRTP media.
external_media_address = ${ASTERISK_PUBLIC_IP}
external_signaling_address = ${ASTERISK_PUBLIC_IP}

; --- Per-operator WebRTC endpoint template ---------------------------------------------
; `webrtc=yes` is the Asterisk shorthand that turns on DTLS-SRTP, ICE, rtcp-mux, AVPF and
; the message/rtp bundling a browser needs. Opus preferred, ulaw/alaw fallback.
[operator-webrtc](!)
type = endpoint
context = from-operator
disallow = all
allow = opus
allow = ulaw
allow = alaw
webrtc = yes
transport = transport-wss
; DTMF over WebRTC is RFC-4733/SIP INFO; auto works for browser softphones.
dtmf_mode = auto

[operator-webrtc-auth](!)
type = auth
auth_type = userpass
password = ${OPERATOR_SIP_SECRET}

[operator-webrtc-aor](!)
type = aor
max_contacts = 1
remove_existing = yes

; --- Example concrete operator (copy per operator; name = operator-<slug>) --------------
; The <slug> MUST match app/telephony/credentials.operator_slug(email). Example below is a
; template placeholder rendered from ${OPERATOR_SLUG_EXAMPLE}; add real operators the same way.
[operator-${OPERATOR_SLUG_EXAMPLE}](operator-webrtc)
auth = operator-${OPERATOR_SLUG_EXAMPLE}-auth
aors = operator-${OPERATOR_SLUG_EXAMPLE}

[operator-${OPERATOR_SLUG_EXAMPLE}-auth](operator-webrtc-auth)
username = operator-${OPERATOR_SLUG_EXAMPLE}

[operator-${OPERATOR_SLUG_EXAMPLE}](operator-webrtc-aor)
