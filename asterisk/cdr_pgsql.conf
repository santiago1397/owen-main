; ============================================================================
; cdr_pgsql.conf — write CDRs into OWEN's Postgres (TEMPLATE)
;
; ${VAR} tokens are substituted from .env.prod at deploy time (see README.md). Asterisk
; writes one CDR row per call into the `cdr` table in the SAME Postgres database OWEN uses;
; OWEN's worker only ever READS that table (app/workers/asterisk_cdr.py). No Alembic
; migration owns `cdr` — Asterisk owns it (create it once, see README.md).
;
; SECURITY: this uses a DEDICATED, least-privilege role (${ASTERISK_CDR_DB_USER}) with
; INSERT on `cdr` only — NOT the app's callmon role. Its password is the only secret here
; and lives solely in .env.prod. cdr_pgsql is "adaptive": it writes only the columns that
; exist in the table, so the schema in README.md (which includes linkedid/uniqueid/answer/
; end) is what OWEN's reconciler relies on.
; ============================================================================

[global]
hostname = ${POSTGRES_HOST}
port = ${POSTGRES_PORT}
dbname = ${POSTGRES_DB}
user = ${ASTERISK_CDR_DB_USER}
password = ${ASTERISK_CDR_DB_PASSWORD}
table = cdr
; Log the connection using appname so it's identifiable in pg_stat_activity.
appname = asterisk_cdr
