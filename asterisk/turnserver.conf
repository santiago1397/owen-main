# ============================================================================
# turnserver.conf — coturn TURN/STUN relay for the operator WebRTC softphone (Ticket 13)
#
# RENDERED template: ${VAR} tokens are substituted from .env.prod at deploy time (same
# envsubst step as the asterisk/*.conf — see README.md). The only secret is
# ${TURN_STATIC_SECRET}, which stays in .env.prod (chmod 600), NEVER in git.
#
# Why coturn: browser DTLS-SRTP media (10000-10200/udp, reused from rtp.conf) can't reach
# operators behind restrictive/symmetric-NAT firewalls. coturn relays that media over
# TLS/443 — a port virtually every firewall allows outbound — so the softphone works
# anywhere. Signalling (wss) is fronted by Traefik; this is the MEDIA relay.
#
# Auth: ephemeral, coturn's `use-auth-secret` (TURN REST API). The backend mints
# time-boxed creds (username="<unix-expiry>:<operator-slug>",
# credential=base64(HMAC-SHA1(${TURN_STATIC_SECRET}, username))) at app-login and hands them
# to SIP.js as iceServers. coturn validates the HMAC + the embedded expiry with NO shared
# state — self-expiring creds. This MUST match app/telephony/credentials.mint_turn_credentials.
# ============================================================================

# Listen on 443 for TLS-relay (tls-listening-port); coturn also answers plain STUN/TURN here.
listening-port=3478
tls-listening-port=443

# The VPS public IP coturn relays from/advertises (external) and its private bind (relay).
listening-ip=${ASTERISK_PUBLIC_IP}
relay-ip=${ASTERISK_PUBLIC_IP}
external-ip=${ASTERISK_PUBLIC_IP}

# Relay only through the SAME media range Asterisk uses — no new firewall range to open.
min-port=10000
max-port=10200

# --- Ephemeral (TURN REST API) auth -----------------------------------------------------
use-auth-secret
static-auth-secret=${TURN_STATIC_SECRET}
realm=${OPERATOR_SIP_DOMAIN}

# --- TLS (reuse the app's existing cert; e.g. Traefik's ACME cert or the host cert) -----
cert=${TURN_TLS_CERT}
pkey=${TURN_TLS_KEY}
# Modern TLS only.
no-tlsv1
no-tlsv1_1

# --- Hardening --------------------------------------------------------------------------
# No plain long-term users; deny relaying to loopback/link-local/multicast + private ranges
# the relay has no business reaching (prevents the TURN server being used as an SSRF pivot).
no-cli
no-multicast-peers
denied-peer-ip=0.0.0.0-0.255.255.255
denied-peer-ip=127.0.0.0-127.255.255.255
denied-peer-ip=169.254.0.0-169.254.255.255
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.168.0.0-192.168.255.255
fingerprint
stale-nonce
