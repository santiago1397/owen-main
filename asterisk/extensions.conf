; ============================================================================
; extensions.conf — dialplan (TEMPLATE)
;
; ${VAR} tokens are substituted from .env.prod at deploy time (see README.md). Nothing
; secret lives here; ${ARI_APP} and ${BULKVS_*} are non-secret identifiers.
;
; Ticket 01 scope is infra + reachability only. The dialplan below is the minimal wiring
; that (a) hands inbound BulkVS calls to the ARI Stasis app so later tickets can drive
; calls/SMS/AI-agents from the backend, and (b) provides an outbound route. Call logic
; itself is intentionally NOT built here yet.
; ============================================================================

[globals]
BULKVS_FROM = ${BULKVS_FROM_NUMBER}

; --- Inbound from the BulkVS trunk -----------------------------------------------------
[from-bulkvs]
; Hand every inbound call to the Stasis (ARI) application; the backend decides routing.
exten = _.,1,NoOp(Inbound BulkVS call to ${EXTEN} from ${CALLERID(num)})
 same = n,Stasis(${ARI_APP})
 same = n,Hangup()

; --- Outbound toward BulkVS ------------------------------------------------------------
[to-bulkvs]
; E.164 destinations dialed out the trunk with the configured caller-ID.
exten = _+.,1,NoOp(Outbound to ${EXTEN} via ${BULKVS_TRUNK_NAME})
 same = n,Set(CALLERID(num)=${BULKVS_FROM})
 same = n,Dial(PJSIP/${EXTEN}@${BULKVS_TRUNK_NAME},60)
 same = n,Hangup()

; --- Operator softphone (Ticket 13) ----------------------------------------------------
; Operator legs are ALWAYS originated by the backend over ARI (PJSIP/operator-<slug> into
; a Stasis bridge); the browser never dials the dialplan. Stub so the endpoint context
; exists — any unexpected browser-originated INVITE is logged and dropped. Every
; operator endpoint in pjsip.conf sets `context = from-operator`, so this section must
; exist or those endpoints reference a context that isn't there.
[from-operator]
exten = _.,1,NoOp(Unexpected operator-originated call to ${EXTEN} — dropping)
 same = n,Hangup()
