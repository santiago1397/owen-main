; ============================================================================
; rtp.conf — RTP media port range
;
; No secrets, so this file can ship as-is (no rendering needed). The range MUST match
; the UFW rule in README.md: 10000-10200/udp open but session-validated, because BulkVS
; sends media from a different range (152.188.166.x) than its signalling SBCs — so we
; cannot pin RTP by source IP the way we pin SIP 5060. Asterisk validates each RTP
; stream against the negotiated session instead (rtp_symmetric / strictrtp).
; ============================================================================

[general]
rtpstart = 10000
rtpend = 10200
strictrtp = yes
