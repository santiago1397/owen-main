; ============================================================================
; rtp.conf — RTP media port range
;
; No secrets, so this file can ship as-is (no rendering needed). The range MUST match
; the UFW rule in README.md: 10000-10200/udp open but session-validated, because BulkVS
; sends media from a different range (152.188.166.x) than its signalling SBCs — so we
; cannot pin RTP by source IP the way we pin SIP 5060. Asterisk validates each RTP
; stream against the negotiated session instead (rtp_symmetric / strictrtp).
; ============================================================================

[general]
rtpstart = 10000
rtpend = 10200
strictrtp = yes

; --- ICE / STUN / TURN for the operator WebRTC softphone (Ticket 13) --------------------
; Browser DTLS-SRTP media negotiates via ICE. We REUSE the same 10000-10200/udp range (no
; new range); ICE just advertises which of our candidates are routable. `stunaddr` lets
; Asterisk discover its own public mapping; the public IP is also pinned on transport-wss
; (pjsip.conf external_media_address) so a candidate for the VPS public IP is always
; offered. coturn (turnserver.conf) provides the TURN relay for operators behind
; restrictive firewalls — the browser gets ephemeral TURN creds from the backend
; (app/telephony/credentials.py) and hands them to SIP.js as iceServers, so Asterisk itself
; does not need turn* creds here.
icesupport = yes
stunaddr = ${STUN_SERVER}
