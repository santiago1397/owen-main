; ============================================================================
; cdr.conf — Call Detail Records engine (TEMPLATE)
;
; Nothing secret here. This turns CDR on and — importantly — logs UNANSWERED calls too,
; so no-answer / busy / failed calls also land a CDR row and get reconciled by OWEN's
; app/workers/asterisk_cdr.py (which projects CDR -> the calls/call_events projection to
; close the live-WS gap). The actual storage backend is cdr_pgsql.conf.
; ============================================================================

[general]
enable = yes
; Log calls that were never answered so missed calls still produce a CDR row (OWEN maps
; disposition NO ANSWER/BUSY/FAILED/CONGESTION -> no-answer/busy/failed terminal statuses).
unanswered = yes
; One CDR row per call (the entry leg). OWEN keys on linkedid and drops secondary legs
; (uniqueid != linkedid), so per-leg CDRs would be filtered anyway; keep the default here.
