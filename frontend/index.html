<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Call Monitor</title>

    <!-- Installable web app. Installing matters beyond convenience: an installed web app
         gets its own storage container, so the saved sign-in is NOT subject to Safari's
         7-day eviction of script-writable storage that applies to ordinary tabs. -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#0f1115" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <!-- iOS standalone. Status bar kept OPAQUE ("black") rather than black-translucent so
         the page is not drawn under the notch — that would need safe-area insets in CSS. -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="OWEN" />

    <!-- Inter, used by the Inbox (/inbox). Loaded as a VARIABLE font on purpose: the body
         weight there is 425, a value only a variable face can hit — a static 400/500/600
         load would silently round it to 400 and lose the weight the design depends on.
         display=swap so a slow font never blocks first paint; the CSS falls back to the
         system stack, so the page is fully usable if this request fails. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
