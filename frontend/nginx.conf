server {
    listen 3333;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: unknown paths fall back to index.html so client-side routing works.
    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # The service worker must never be served stale, or a deploy can't dislodge the old one.
    location = /sw.js {
        add_header Cache-Control "no-cache";
    }

    # Not in nginx's default mime.types on every image; without it the manifest is served
    # as text/plain and silently ignored, which breaks installability.
    location = /manifest.webmanifest {
        types { } default_type application/manifest+json;
    }
}
